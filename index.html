<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#111111" />
    <meta name="color-scheme" content="light" />

    <title>Fegance — Luxury Perfume Collection</title>
    <meta
      name="description"
      content="Discover Fegance — premium fragrances crafted to define your identity. Floral, woody, oriental &amp; fresh scents. Shop our signature collection on Shopee &amp; TikTok."
    />
    <meta
      name="keywords"
      content="luxury perfume, premium fragrance, Fegance, parfum Indonesia, eau de parfum, woody, floral, oriental"
    />
    <meta name="author" content="Fegance" />
    <link rel="canonical" href="https://fegance.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Fegance" />
    <meta property="og:title" content="Fegance — Luxury in Every Drop" />
    <meta
      property="og:description"
      content="Premium fragrances crafted to define your identity. Discover the signature collection."
    />
    <meta property="og:url" content="https://fegance.com/" />
    <meta property="og:image" content="https://fegance.com/og-image.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fegance — Luxury in Every Drop" />
    <meta
      name="twitter:description"
      content="Premium fragrances crafted to define your identity."
    />

    <!-- Fonts: preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400;1,9..40,500;1,9..40,600&display=swap"
      rel="stylesheet"
    />

    <!-- Structured data: brand -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Brand",
        "name": "Fegance",
        "description": "Luxury perfume house crafting premium fragrances for those who appreciate the finer things in life.",
        "url": "https://fegance.com",
        "logo": "https://fegance.com/favicon.svg",
        "sameAs": [
          "https://instagram.com/fegance",
          "https://tiktok.com/@fegance"
        ]
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
